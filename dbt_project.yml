name: 'redsox_dbt'
version: '1.0.0'
config-version: 2

profile: 'redsox_dbt'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  redsox_dbt:
    raw:
      +schema: baseball_raw
      +materialized: table
      +tags: ["raw"]

    staging:
      +schema: baseball_staging
      +materialized: view
      +tags: ["staging"]

    mart:
      +schema: baseball_mart
      +materialized: table
      +tags: ["mart"]
      dimensions:
        +materialized: view
        dim_teams:
          +materialized: table
      facts:
        +materialized: incremental
      aggregates:
        +materialized: table
      dashboard:
        +schema: baseball_dev
        +materialized: table
        +tags: ["dashboard"]
