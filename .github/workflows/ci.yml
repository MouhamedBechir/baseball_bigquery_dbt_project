name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dbt
      run: |
        pip install dbt-bigquery
        
    - name: Install dependencies
      run: |
        dbt deps
        
    - name: Run dbt build (dev target)
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        BIGQUERY_TOKEN: ${{ secrets.BIGQUERY_TOKEN }}
      run: |
        dbt build --target dev
        
    - name: Run dbt tests
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        BIGQUERY_TOKEN: ${{ secrets.BIGQUERY_TOKEN }}
      run: |
        dbt test --target dev
        
    - name: Generate docs
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        BIGQUERY_TOKEN: ${{ secrets.BIGQUERY_TOKEN }}
      run: |
        dbt docs generate --target dev
